<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>色彩斑斓的现代网页 - 2026 设计趋势</title>
    <style>
        /* 1. 基础样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* 防止背景滚动 */
            background-color: #0a0a0a;
        }

        /* 2. 动态流动背景 (Mesh Gradient) */
        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(45deg, #ff3d00, #ff00c8, #7000ff, #00d4ff);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
        }

        /* 背景流动的动画 */
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 额外的发光装饰圆球 */
        .orb {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
            z-index: -1;
            animation: float 20s infinite alternate;
        }
        .orb-1 { background: #ff0055; top: -100px; left: -100px; }
        .orb-2 { background: #00fbff; bottom: -150px; right: -100px; animation-delay: -5s; }

        @keyframes float {
            from { transform: translate(0, 0); }
            to { transform: translate(100px, 100px); }
        }

        /* 3. 玻璃拟态卡片 (Glassmorphism) */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 50px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            color: white;
            transition: transform 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            background: linear-gradient(to right, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            line-height: 1.6;
            margin-bottom: 30px;
            color: rgba(255, 255, 255, 0.8);
        }

        /* 4. 极光按钮 */
        .btn {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(90deg, #ff00c8, #7000ff);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(112, 0, 255, 0.3);
        }

        .btn:hover {
            box-shadow: 0 0 30px rgba(255, 0, 200, 0.6);
            transform: scale(1.05);
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

    </style>
</head>
<body>

    <!-- 动态背景 -->
    <div class="background"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <!-- 核心内容 -->
    <div class="glass-card">
        <h1>幻彩空间</h1>
        <p>探索 2026 年最前沿的网页视觉。结合了动态网格渐变与玻璃拟态设计，让每一个像素都充满生命力与深度。</p>
        <a href="#" class="btn">立即开始</a>
    </div>

</body>
</html>
