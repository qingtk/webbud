<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文字转语音工具 | Text-to-Speech Pro</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
        min-height: 100vh;
  }
  .container { max-width: 780px; margin: 0 auto; }
  h1 { text-align: center;  color: #1a1a2e; font-size: 26px; }
  .card {
    background: #fff; border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,.07); padding: 4px; margin-bottom: 2px;
  }
  .card h2 {
    font-size: 15px; color: #555; margin-bottom: 2px;
    border-bottom: 1px solid #eee; padding-bottom: 1px;
  }
  /* ---------- textarea ---------- */
  textarea {
    width: 100%; height: 140px; border: 2px solid #e0e0e0; border-radius: 8px;
    padding: 2px; font-size: 15px; resize: vertical; font-family: inherit;
    transition: border-color .25s;
  }
  textarea:focus { outline: none; border-color: #4a6cf7; }
  .text-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 2px; }
  .text-info { font-size: 13px; color: #999; }
  .presets { display: flex; gap: 2px; flex-wrap: wrap; }
  .preset-btn {
    padding: 3px 12px; background: #f3f3f3; border-radius: 20px;
    font-size: 12px; color: #666; cursor: pointer; border: 1px solid #ddd;
    transition: background .2s;
  }
  .preset-btn:hover { background: #e4e4e4; }
  /* ---------- controls ---------- */
  .ctrl { margin-bottom: 2px; }
  .ctrl:last-child { margin-bottom: 0; }
  .ctrl label { display: block; font-weight: 600;  font-size: 14px; }
  select {
    width: 100%; border: 2px solid #e0e0e0; border-radius: 4px;
    font-size: 14px; background: #fff; cursor: pointer;
  }
  select:focus { outline: none; border-color: #4a6cf7; }
  .slider-row { display: flex; align-items: center; gap: 2px; }
  input[type="range"] {
    flex: 1; -webkit-appearance: none; height: 6px;
    background: #e0e0e0; border-radius: 3px; outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 18px; height: 18px;
    background: #4a6cf7; border-radius: 50%; cursor: pointer;
  }
  .slider-val {
    min-width: 42px; text-align: center; font-weight: 700;
    color: #4a6cf7; font-size: 14px;
  }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; }
  /* ---------- buttons ---------- */
  .btn-row { display: flex; gap: 12px; flex-wrap: wrap; }
  button {
    border: none; border-radius: 2px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    transition: background .2s, opacity .2s;
    display: inline-flex; align-items: center; gap: 12px;
  }
  button:disabled { opacity: .45; cursor: not-allowed; }
  .bp { background: #4a6cf7; color: #fff; }
  .bp:hover:not(:disabled) { background: #3a5ce5; }
  .bw { background: #f59e0b; color: #fff; }
  .bw:hover:not(:disabled) { background: #d97706; }
  .bs { background: #10b981; color: #fff; }
  .bs:hover:not(:disabled) { background: #059669; }
  .bd { background: #ef4444; color: #fff; }
  .bd:hover:not(:disabled) { background: #dc2626; }
  /* ---------- status ---------- */
  .status {
    margin-top: 2px;  border-radius: 8px;
    background: #f8f9fa; font-size: 14px; color: #666;
    display: flex; align-items: center; gap: 2px; min-height: 42px;
    transition: background .3s, color .3s;
  }
  .status.speaking { background: #eff6ff; color: #1d4ed8; }
  .status.recording { background: #fef2f2; color: #dc2626; }
  .status.paused { background: #fffbeb; color: #d97706; }
  .dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: currentColor; animation: blink 1s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }
  /* ---------- highlight ---------- */
  .hl-box {
    margin-top: 2px; padding: 14px; background: #f8f9fa; border-radius: 8px;
    font-size: 15px; line-height: 1.9; max-height: 180px;
    overflow-y: auto; white-space: pre-wrap; word-break: break-word; display: none;
  }
  .hl-box .done { color: #aaa; }
  .hl-box .cur  { background: #fef08a; border-radius: 3px; padding: 0 2px; font-weight: 600; }
  .hl-box .rest { color: #333; }
  /* ---------- export ---------- */
  .export-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .export-row select { width: auto; min-width: 130px; }
  .tip { font-size: 12px; color: #999; margin-top: 2px; line-height: 1.6; }
  /* ---------- responsive ---------- */
  @media(max-width:600px){
    .grid2 { grid-template-columns: 1fr; }
    .export-row { flex-direction: column; align-items: stretch; }
  }
</style>
</head>
<body>

<div class="container">
  <!-- ====== Text Input ====== -->
  <div class="card">
    <textarea id="txt" placeholder="请输入要转换的文本…">Web Speech API 提供了语音合成功能，可以将文本转换为自然流畅的语音。你可以调节语速、音调和音量，还可以选择不同的语音角色来朗读文本。</textarea>
    <div class="text-meta">
      <div class="presets">
        <span class="preset-btn" data-p="zh">中文示例</span>
        <span class="preset-btn" data-p="en">English</span>
        <span class="preset-btn" data-p="ja">日本語</span>
      </div>
      <span class="text-info"><span id="cc">0</span> 字符</span>
    </div>
  </div>

  <!-- ====== Voice Settings ====== -->
  <div class="card">
    <div class="ctrl">
      <label for="voice">🗣️ 语音</label>
      <select id="voice"></select>
    </div>
    <div class="grid2">
      <div class="ctrl">
        <label>🎵 音调 Pitch</label>
        <div class="slider-row">
          <input type="range" id="pitch" min="0" max="2" step="0.1" value="1">
          <span class="slider-val" id="pitchV">1.0</span>
        </div>
      </div>
      <div class="ctrl">
        <label>⚡ 语速 Rate</label>
        <div class="slider-row">
          <input type="range" id="rate" min="0.1" max="4" step="0.1" value="1">
          <span class="slider-val" id="rateV">1.0</span>
        </div>
      </div>
      <div class="ctrl">
        <label>🔈 音量 Volume</label>
        <div class="slider-row">
          <input type="range" id="vol" min="0" max="1" step="0.05" value="1">
          <span class="slider-val" id="volV">1.0</span>
        </div>
      </div>
    </div>
  </div>

  <!-- ====== Playback ====== -->
  <div class="card">
    <h2>播放控制</h2>
    <div class="btn-row">
      <button class="bp" id="bPlay">▶ 播放</button>
      <button class="bw" id="bPause" disabled>⏸ 暂停</button>
      <button class="bs" id="bResume" disabled>▶ 继续</button>
      <button class="bd" id="bStop" disabled>⏹ 停止</button>
    </div>
    <div class="status" id="st">💤 就绪 — 输入文本并点击播放</div>
    <div class="hl-box" id="hl"></div>
  </div>

  <!-- ====== Export ====== -->
  <div class="card">
    <div class="export-row">
      <select id="fmt">
        <option value="wav">WAV 格式</option>
        <option value="mp3">MP3 格式</option>
      </select>
      <button class="bs" id="bExport">⬇ 导出音频</button>
    </div>
    <p class="tip">导出时浏览器会弹出屏幕共享对话框，请切换到<b>「整个屏幕」</b>选项卡，勾选底部<b>「同时共享系统音频」</b>后点击分享。录制期间请勿播放其他声音以保证音频纯净。</p>
  </div>
</div>

<!-- lamejs for MP3 encoding (optional, graceful fallback) -->
<script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js" defer></script>

<script>
// ===================== helpers =====================
const $ = s => document.getElementById(s);
const esc = t => { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; };

// ===================== state =====================
const synth = window.speechSynthesis;
let voices = [], utt = null;

// ===================== DOM refs =====================
const txt     = $('txt'),   voiceSel = $('voice');
const pitch   = $('pitch'), rate     = $('rate'),  vol = $('vol');
const pitchV  = $('pitchV'),rateV    = $('rateV'), volV = $('volV');
const bPlay   = $('bPlay'), bPause   = $('bPause');
const bResume = $('bResume'), bStop  = $('bStop');
const stBar   = $('st'),    hlBox   = $('hl');
const bExport = $('bExport');

// ===================== voices =====================
function loadVoices() {
  voices = synth.getVoices();
  if (!voices.length) return;
  voiceSel.innerHTML = '';
  const groups = {};
  voices.forEach((v, i) => {
    const k = v.lang.split('-')[0];
    (groups[k] || (groups[k] = [])).push({ v, i });
  });
  // prioritise zh, en
  const keys = Object.keys(groups).sort((a, b) => {
    if (a === 'zh') return -1; if (b === 'zh') return 1;
    if (a === 'en') return -1; if (b === 'en') return 1;
    return a.localeCompare(b);
  });
  keys.forEach(k => {
    const og = document.createElement('optgroup');
    og.label = k.toUpperCase();
    groups[k].forEach(({ v, i }) => {
      const o = document.createElement('option');
      o.value = i;
      o.textContent = `${v.name} (${v.lang})${v.default ? ' ★' : ''}`;
      if (v.default) o.selected = true;
      og.appendChild(o);
    });
    voiceSel.appendChild(og);
  });
}
loadVoices();
if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoices;

// ===================== sliders =====================
pitch.oninput = () => pitchV.textContent = Number(pitch.value).toFixed(1);
rate.oninput  = () => rateV.textContent  = Number(rate.value).toFixed(1);
vol.oninput   = () => volV.textContent   = Number(vol.value).toFixed(2);

// ===================== char count =====================
function updCC() { $('cc').textContent = txt.value.length; }
txt.addEventListener('input', updCC); updCC();

// ===================== presets =====================
const presets = {
  zh: 'Web Speech API 提供了语音合成功能，可以将文本转换为自然流畅的语音。你可以调节语速、音调和音量，还可以选择不同的语音角色来朗读文本。',
  en: 'The Web Speech API enables text-to-speech synthesis in the browser. You can adjust pitch, rate, and volume, and choose from many available voices to read your text aloud.',
  ja: 'Web Speech APIは、テキストを音声に変換する機能を提供します。音声の速度やピッチ、音量を調整し、さまざまな音声で読み上げることができます。'
};
document.querySelectorAll('.preset-btn').forEach(b => {
  b.onclick = () => { txt.value = presets[b.dataset.p] || ''; updCC(); };
});

// ===================== status =====================
function setStatus(msg, cls) {
  stBar.className = 'status ' + (cls || '');
  stBar.innerHTML = (cls ? '<span class="dot"></span> ' : '') + msg;
}

// ===================== button states =====================
function btnState(s) {
  const map = { idle:[0,1,1,1], speaking:[1,0,1,0], paused:[1,1,0,0] };
  const d = map[s] || map.idle;
  [bPlay, bPause, bResume, bStop].forEach((b, i) => b.disabled = !!d[i]);
}

// ===================== utterance factory =====================
function makeUtt(text) {
  const u = new SpeechSynthesisUtterance(text);
  const v = voices[voiceSel.value];
  if (v) u.voice = v;
  u.pitch  = +pitch.value;
  u.rate   = +rate.value;
  u.volume = +vol.value;
  return u;
}

// ===================== Chrome long-text workaround =====================
// Chrome stops speaking after ~15 s; periodically pause/resume to prevent that.
let keepAlive = null;
function startKeepAlive() {
  stopKeepAlive();
  keepAlive = setInterval(() => {
    if (synth.speaking && !synth.paused) { synth.pause(); synth.resume(); }
  }, 12000);
}
function stopKeepAlive() { if (keepAlive) { clearInterval(keepAlive); keepAlive = null; } }

// ===================== playback =====================
bPlay.onclick = function () {
  const text = txt.value.trim();
  if (!text) { setStatus('⚠️ 请输入文本'); return; }
  synth.cancel();
  utt = makeUtt(text);

  hlBox.style.display = 'block';
  hlBox.innerHTML = `<span class="rest">${esc(text)}</span>`;

  utt.onboundary = e => {
    if (e.name !== 'word') return;
    hlBox.innerHTML =
      `<span class="done">${esc(text.slice(0, e.charIndex))}</span>` +
      `<span class="cur">${esc(text.slice(e.charIndex, e.charIndex + e.charLength))}</span>` +
      `<span class="rest">${esc(text.slice(e.charIndex + e.charLength))}</span>`;
  };
  utt.onstart = () => { setStatus('🔊 正在朗读…', 'speaking'); btnState('speaking'); startKeepAlive(); };
  utt.onend   = () => { setStatus('✅ 朗读完成'); btnState('idle'); stopKeepAlive();
    hlBox.innerHTML = `<span class="done">${esc(text)}</span>`; };
  utt.onerror = e => {
    if (e.error === 'canceled') return;
    setStatus('❌ 错误: ' + e.error); btnState('idle'); stopKeepAlive();
  };
  synth.speak(utt);
};

bPause.onclick  = () => { synth.pause();  setStatus('⏸️ 已暂停', 'paused'); btnState('paused'); stopKeepAlive(); };
bResume.onclick = () => { synth.resume(); setStatus('🔊 继续朗读…', 'speaking'); btnState('speaking'); startKeepAlive(); };
bStop.onclick   = () => { synth.cancel(); setStatus('⏹️ 已停止'); btnState('idle'); hlBox.style.display = 'none'; stopKeepAlive(); };

// ===================== export =====================
bExport.onclick = async function () {
  const text = txt.value.trim();
  if (!text) { setStatus('⚠️ 请输入文本'); return; }

  const format = $('fmt').value;
  bExport.disabled = true;
  bExport.textContent = '⏳ 准备录制…';

  try {
    setStatus('🎙️ 请选择「整个屏幕」并勾选「同时共享系统音频」…', 'recording');

    // 1. capture system audio (speechSynthesis outputs via OS, not browser tab)
    const display = await navigator.mediaDevices.getDisplayMedia({
      video: true,
      audio: true,
      systemAudio: 'include'
    });

    const audioTracks = display.getAudioTracks();
    if (!audioTracks.length) {
      display.getTracks().forEach(t => t.stop());
      throw new Error('未获取到音频轨道，请选择「整个屏幕」并勾选「同时共享系统音频」');
    }
    // drop video track
    display.getVideoTracks().forEach(t => t.stop());
    const aStream = new MediaStream(audioTracks);

    // 2. set up MediaRecorder
    const mime = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
      ? 'audio/webm;codecs=opus' : 'audio/webm';
    const rec = new MediaRecorder(aStream, { mimeType: mime });
    const chunks = [];
    rec.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };

    const recDone = new Promise((res, rej) => {
      rec.onstop  = () => res(new Blob(chunks, { type: mime }));
      rec.onerror = e  => rej(e.error || e);
    });

    // 3. start recording, then speak (brief delay to skip share-dialog sounds)
    rec.start();
    setStatus('🔴 录制中…', 'recording');
    bExport.textContent = '🔴 录制中…';

    await new Promise(r => setTimeout(r, 600));
    synth.cancel();
    const eu = makeUtt(text);

    await new Promise((res, rej) => {
      eu.onend = () => setTimeout(() => {
        rec.stop();
        aStream.getTracks().forEach(t => t.stop());
        res();
      }, 400);
      eu.onerror = e => {
        rec.stop(); aStream.getTracks().forEach(t => t.stop());
        rej(new Error('语音合成错误: ' + e.error));
      };
      synth.speak(eu);
    });

    // 4. process recorded audio
    setStatus('⏳ 正在编码…');
    bExport.textContent = '⏳ 编码中…';
    const webmBlob = await recDone;
    const audioBuf = await decodeBlob(webmBlob);

    if (format === 'mp3') {
      const blob = await toMP3(audioBuf);
      download(blob, 'speech.mp3');
    } else {
      download(toWAV(audioBuf), 'speech.wav');
    }
    setStatus('✅ 导出完成！');

  } catch (err) {
    console.error(err);
    setStatus(err.name === 'NotAllowedError' ? '❌ 用户取消了共享' : '❌ ' + err.message);
  } finally {
    synth.cancel();
    bExport.disabled = false;
    bExport.textContent = '⬇ 导出音频';
  }
};

// ===================== audio encoding helpers =====================
async function decodeBlob(blob) {
  const buf = await blob.arrayBuffer();
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const ab  = await ctx.decodeAudioData(buf);
  ctx.close();
  return ab;
}

function toWAV(ab) {
  const ch = ab.numberOfChannels, sr = ab.sampleRate, bps = 16;
  const chs = []; for (let i = 0; i < ch; i++) chs.push(ab.getChannelData(i));
  const len = chs[0].length, dLen = len * ch * 2;
  const buf = new ArrayBuffer(44 + dLen), v = new DataView(buf);
  const ws = (o, s) => { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
  ws(0,'RIFF'); v.setUint32(4, 36 + dLen, true); ws(8,'WAVE');
  ws(12,'fmt '); v.setUint32(16,16,true); v.setUint16(20,1,true);
  v.setUint16(22, ch, true); v.setUint32(24, sr, true);
  v.setUint32(28, sr * ch * 2, true); v.setUint16(32, ch * 2, true);
  v.setUint16(34, bps, true); ws(36,'data'); v.setUint32(40, dLen, true);
  let off = 44;
  for (let i = 0; i < len; i++) {
    for (let c = 0; c < ch; c++) {
      let s = Math.max(-1, Math.min(1, chs[c][i]));
      v.setInt16(off, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
      off += 2;
    }
  }
  return new Blob([buf], { type: 'audio/wav' });
}

async function toMP3(ab) {
  if (typeof lamejs === 'undefined') {
    setStatus('⚠️ MP3 编码器未加载，改为导出 WAV');
    return toWAV(ab);
  }
  const ch = Math.min(ab.numberOfChannels, 2), sr = ab.sampleRate;
  const enc = new lamejs.Mp3Encoder(ch, sr, 192);
  const f2i = f => {
    const r = new Int16Array(f.length);
    for (let i = 0; i < f.length; i++) {
      let s = Math.max(-1, Math.min(1, f[i]));
      r[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
    }
    return r;
  };
  const L = f2i(ab.getChannelData(0));
  const R = ch > 1 ? f2i(ab.getChannelData(1)) : L;
  const parts = [], bs = 1152;
  for (let i = 0; i < L.length; i += bs) {
    const b = enc.encodeBuffer(L.subarray(i, i + bs), R.subarray(i, i + bs));
    if (b.length) parts.push(b);
  }
  const e = enc.flush();
  if (e.length) parts.push(e);
  return new Blob(parts, { type: 'audio/mp3' });
}

function download(blob, name) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(a.href), 3000);
}
</script>
</body>
</html>
