<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8">
  <title>CSS Grid Layout - Template Areas with Theme Switcher</title>
  <link id="theme-stylesheet" rel="stylesheet" href="./GreenCoral.css">
  <style>
    .theme-switcher {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(255, 255, 255, 0.95);
      padding: 1px;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      backdrop-filter: blur(10px);
      z-index: 1000;
    }
    .theme-switcher select {
      padding: 8px 12px;
      border-radius: 5px;
      border: 2px solid #ddd;
      background: white;
      font-size: 14px;
      cursor: pointer;
    }
    .theme-switcher label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: #333;
    }
    
    /* Mathematical Animation for Content-2 */
    .content-2 {
      position: relative;
      overflow: hidden;
    }
    
    .content-2::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.3) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(255,255,255,0.2) 0%, transparent 50%),
        radial-gradient(circle at 40% 70%, rgba(255,255,255,0.15) 0%, transparent 50%);
      animation: mathWave 8s ease-in-out infinite;
      pointer-events: none;
    }
    
    .content-2::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.1) 50%, transparent 70%);
      animation: mathSweep 6s linear infinite;
      pointer-events: none;
    }
    
    @keyframes mathWave {
      0%, 100% {
        transform: translateY(0px) scale(1) rotate(0deg);
        opacity: 0.8;
      }
      25% {
        transform: translateY(-10px) scale(1.05) rotate(90deg);
        opacity: 1;
      }
      50% {
        transform: translateY(-5px) scale(0.95) rotate(180deg);
        opacity: 0.6;
      }
      75% {
        transform: translateY(-15px) scale(1.1) rotate(270deg);
        opacity: 0.9;
      }
    }
    
    @keyframes mathSweep {
      0% {
        transform: translateX(-100%) skewX(-15deg);
      }
      100% {
        transform: translateX(200%) skewX(-15deg);
      }
    }
  </style>

</head>
<body>
<!-- Theme Switcher -->
<div class="theme-switcher">
  <label for="theme-selector">Choose Theme:</label>
  <select id="theme-selector">
    <option value="GreenCoral" selected>🌿 Green Coral</option>
    <option value="DarkPurple">🔮 Dark Purple</option>
    <option value="OriginalBlue">🟦 Original Blue</option>
    <option value="Ocean">🌊 Ocean</option>
    <option value="Sunset">🌅 Sunset</option>
    <option value="Forest">🌲 Forest</option>
    <option value="Monochrome">⚫ Monochrome</option>
    <option value="Neon">🔆 Neon</option>
    <option value="Pastel">🎈 Pastel</option>
    <option value="Fire">🔥 Fire</option>
    <option value="Ice">❄️ Ice</option>
    <option value="Earth">🌍 Earth</option>
    <option value="SpringFresh">🌱 Spring Fresh</option>
    <option value="SunnyDay">☀️ Sunny Day</option>
    <option value="PureDream">🤍 Pure Dream</option>
    <option value="CoralBreeze">🌺 Coral Breeze</option>
    <option value="MintFresh">🍃 Mint Fresh</option>
  </select>
</div>

<!-- partial:index.partial.html -->
<div class="container">
  <div class="item header">header</div>
  <div class="item sidebar">sidebar</div>
  <div class="item content-1">Content-1</div>
  <div class="item content-2">Content-2</div>
  <div class="item content-3">Content-3</div>
  <div class="item footer">footer</div>
</div>
<!-- partial -->
  <script  src="./script2.js"></script>
  
  <script>
    // Theme switcher functionality
    document.addEventListener('DOMContentLoaded', function() {
      const themeSelector = document.getElementById('theme-selector');
      const themeStylesheet = document.getElementById('theme-stylesheet');
      
      // Migration mapping for old theme names to new names
      const themeMigration = {
        'style1': 'DarkPurple',
        'style2': 'OriginalBlue',
        'style3': 'Ocean',
        'style4': 'Sunset',
        'style5': 'Forest',
        'style6': 'Monochrome',
        'style7': 'Neon',
        'style8': 'Pastel',
        'style9': 'Fire',
        'style10': 'Ice',
        'style11': 'Earth'
      };
      // Load saved theme from localStorage or default to GreenCoral
      let savedTheme = localStorage.getItem('selectedTheme') || 'GreenCoral';
      
      // Migrate old theme names to new ones
      if (themeMigration[savedTheme]) {
        savedTheme = themeMigration[savedTheme];
        localStorage.setItem('selectedTheme', savedTheme);
      }
      
      themeSelector.value = savedTheme;
      themeStylesheet.href = `./${savedTheme}.css`;
      
      // Handle theme change
      themeSelector.addEventListener('change', function() {
        const selectedTheme = themeSelector.value;
        themeStylesheet.href = `./${selectedTheme}.css`;
        localStorage.setItem('selectedTheme', selectedTheme);
        
        // Add a smooth transition effect
        document.body.style.transition = 'all 0.3s ease';
        setTimeout(() => {
          document.body.style.transition = '';
        }, 300);
      });
    });
  </script>

</body>
</html>
