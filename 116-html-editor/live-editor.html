<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Single File HTML Editor</title>
    <style>
        /* --- CSS STYLES --- */
        :root {
            --bg-color: #1e1e1e;
            --text-color: #d4d4d4;
            --header-height: 50px;
            --border-color: #333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
        }

        /* Header */
        header {
            height: var(--header-height);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            background-color: #252526;
            border-bottom: 1px solid var(--border-color);
        }

        h1 {
            font-size: 1.2rem;
            font-weight: 500;
        }

        .actions button {
            background-color: #0e639c;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .actions button:hover {
            background-color: #1177bb;
        }

        /* Main Workspace */
        .workspace {
            display: flex;
            height: calc(100vh - var(--header-height));
            width: 100%;
        }

        /* Editor Area (Left) */
        .editor-container {
            width: 50%;
            height: 100%;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .panel-label {
            background: #252526;
            padding: 5px 10px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            border-bottom: 1px solid var(--border-color);
        }

        textarea {
            flex: 1;
            background-color: var(--bg-color);
            color: #9cdcfe; /* Light blue usually looks good for generic code */
            border: none;
            resize: none;
            padding: 20px;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.5;
            outline: none;
            white-space: pre;
            overflow-wrap: normal;
            overflow-x: auto;
        }

        /* Preview Area (Right) */
        .preview-container {
            width: 50%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background-color: white; /* Preview usually needs white bg */
        }

        iframe {
            flex: 1;
            border: none;
            width: 100%;
            height: 100%;
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .workspace {
                flex-direction: column;
            }
            .editor-container, .preview-container {
                width: 100%;
                height: 50%;
            }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <h1>HTML Live Editor</h1>
        <div class="actions">
            <button onclick="downloadCode()">Download .html</button>
        </div>
    </header>

    <!-- Main Workspace -->
    <div class="workspace">
        <!-- Input Section -->
        <div class="editor-container">
            <div class="panel-label">Source Code</div>
            <textarea id="htmlCode" spellcheck="false" oninput="updatePreview()"></textarea>
        </div>

        <!-- Output Section -->
        <div class="preview-container">
            <div class="panel-label" style="background:#f0f0f0; color:#333; border-bottom:1px solid #ccc;">Live Preview</div>
            <iframe id="preview"></iframe>
        </div>
    </div>

    <script>
        /* --- JAVASCRIPT LOGIC --- */
        
        // 1. Define default content
        const defaultCode = `<!DOCTYPE html>
<html>
<head>
    <style>
        body { 
            font-family: sans-serif; 
            text-align: center; 
            padding: 50px;
            background: #f4f4f9;
        }
        h1 { color: #333; }
        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: inline-block;
        }
        button {
            background: #ff4757;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover { background: #ff6b81; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Hello World!</h1>
        <p>Edit the code on the left to see changes here instantly.</p>
        <button onclick="alert('It works!')">Click Me</button>
    </div>

</body>
</html>`;

        // 2. Select Elements
        const textarea = document.getElementById('htmlCode');
        const iframe = document.getElementById('preview');

        // 3. Initialize
        textarea.value = defaultCode;
        updatePreview();

        // 4. Function to update the iframe
        function updatePreview() {
            const code = textarea.value;
            const iframeDoc = iframe.contentWindow.document;
            
            iframeDoc.open();
            iframeDoc.write(code);
            iframeDoc.close();
        }

        // 5. Function to download the file
        function downloadCode() {
            const element = document.createElement('a');
            const file = new Blob([textarea.value], {type: 'text/html'});
            element.href = URL.createObjectURL(file);
            element.download = "index.html";
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);
        }

        // Optional: Enable Tab key indentation in textarea
        textarea.addEventListener('keydown', function(e) {
            if (e.key == 'Tab') {
                e.preventDefault();
                var start = this.selectionStart;
                var end = this.selectionEnd;

                // Insert 4 spaces
                this.value = this.value.substring(0, start) +
                    "    " + this.value.substring(end);

                // Move cursor
                this.selectionStart = this.selectionEnd = start + 4;
                
                // Update preview immediately after tab
                updatePreview();
            }
        });
    </script>
</body>
</html>
