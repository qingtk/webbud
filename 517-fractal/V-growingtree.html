<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-Growing Tree Fractal</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="fractalCanvas"></canvas>
    <script>
        const canvas = document.getElementById('fractalCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // --- Fractal Parameters ---
        const maxDepth = 5;
        // The angle for each arm of the 'V' relative to its own central axis.
        // 45 degrees creates a 90-degree total split between the two arms.
        const splitAngle = 45; 
        // Length ratio for subsequent branches. For the square-like structure,
        // this should be 1/sqrt(2), which is ~0.707.
        const lengthRatio = 0.707; 

        ctx.strokeStyle = 'yellow';
        ctx.lineWidth = 2;

        /**
         * Draws a 'V' shape and recursively calls itself for the next level.
         * @param {number} x - The x-coordinate of the V's base point.
         * @param {number} y - The y-coordinate of the V's base point.
         * @param {number} length - The length of each arm of the V.
         * @param {number} angle - The central upward angle for the V.
         * @param {number} depth - The current recursion depth.
         */
        function drawV(x, y, length, angle, depth) {
            if (depth > maxDepth) {
                return;
            }

            // 1. Calculate the angles for the left and right arms of the current V
            const leftArmAngle = -115//angle - splitAngle;
            const rightArmAngle = -65//angle + splitAngle;

            // 2. Calculate the end points for both arms
            const endX_left = x + length * Math.cos(leftArmAngle * Math.PI / 180);
            const endY_left = y + length * Math.sin(leftArmAngle * Math.PI / 180);

            const endX_right = x + length * Math.cos(rightArmAngle * Math.PI / 180);
            const endY_right = y + length * Math.sin(rightArmAngle * Math.PI / 180);

            // 3. Draw the two arms of the V
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(endX_left, endY_left);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(endX_right, endY_right);
            ctx.stroke();

            // 4. Recursively call drawV for the next level at the end of each arm.
            // The new V's central angle is the angle of the arm it grows from.
            const newLength = length * lengthRatio;
            drawV(endX_left, endY_left, newLength, leftArmAngle, depth + 1);
            drawV(endX_right, endY_right, newLength, rightArmAngle, depth + 1);
        }

        // --- Initial Drawing Setup ---
        const startLength = canvas.height / 5;
        const startX = canvas.width / 2;
        const startY = canvas.height;
        
        // Draw the initial vertical trunk
        const trunkTopY = startY - startLength;
        ctx.beginPath();
        ctx.moveTo(startX, startY);
        ctx.lineTo(startX, trunkTopY);
        ctx.stroke();

        // Start the fractal growth from the top of the trunk
        // The first V grows straight up (-90 degrees)
        drawV(startX, trunkTopY, startLength, -90, 0);

    </script>
</body>
</html>
