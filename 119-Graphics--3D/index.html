<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>25个动态圆</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  html,body { margin:0; height:100%; background:#fff; overflow:hidden; }
  canvas { display:block; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
resize();
window.addEventListener("resize", resize);

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

// 创建圆数据
const circles = Array.from({length:12}, ()=>({
  x: Math.random()*canvas.width,
  y: Math.random()*canvas.height,
  r: 20 + Math.random()*40,
  phase: Math.random()*Math.PI*2,
  speed: 0.01 + Math.random()*0.02,
  hue: Math.random()*360
}));

function draw(time){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  circles.forEach(c=>{
    // 动态变化
    c.phase += c.speed;
    const dx = Math.sin(c.phase*1.3) * 50;
    const dy = Math.cos(c.phase*1.7) * 50;
    const dr = Math.sin(c.phase*2) * 10;
    c.hue = (c.hue + 0.5) % 360;

    ctx.beginPath();
    ctx.strokeStyle = `hsl(${c.hue}, 80%, 50%)`;
    ctx.lineWidth = 2;
    ctx.arc(c.x+dx, c.y+dy, Math.abs(c.r+dr), 0, Math.PI*2);
    ctx.stroke();
  });
}

function animate(time){
  draw(time);
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
