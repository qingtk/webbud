<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <!-- 完整优化版视口meta标签 -->
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no"
        />
        <title>移动设备适配示例</title>
        <style>
            /* 基础样式重置 */
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            /* 响应式布局：借助CSS媒体查询适配不同设备宽度 */
            .container {
                width: 90%;
                margin: 20px auto;
                padding: 20px;
                background-color: #f5f5f5;
                border-radius: 8px;
            }

            /* 手机小屏（≤375px） */
            @media (max-width: 375px) {
                .container {
                    font-size: 14px;
                    background-color: #e8f4f8;
                }
            }

            /* 平板端（≥768px） */
            @media (min-width: 768px) {
                .container {
                    font-size: 18px;
                    background-color: #f0f8fb;
                    max-width: 700px;
                }
            }
        </style>
    </head>
    <body>
        <div class="container">
            这是一个适配不同移动设备的示例，可在手机、平板上打开查看效果。
        </div>
    </body>
</html>
