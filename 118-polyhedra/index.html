<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>五个正多面体 + 截角二十面体</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  html,body { margin:0; height:100%; background:#fff; }
  #container { width:100%; height:100%; }
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.159.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.159.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="container"></div>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";

// 场景
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);

// 相机
const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 2000);
camera.position.set(0, 0, 14);

// 渲染器
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
document.getElementById("container").appendChild(renderer.domElement);

// 控制器
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// 灯光
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5,10,7);
scene.add(dirLight);

const ambLight = new THREE.AmbientLight(0xaaaaaa, 0.8);
scene.add(ambLight);

// 随机扰动颜色
function jitterColor(hex, j=0.15){
  const c = new THREE.Color(hex);
  const hsl = {}; c.getHSL(hsl);
  hsl.s = Math.min(1, hsl.s*(1+(Math.random()*2-1)*j));
  hsl.l = Math.min(1, hsl.l*(1+(Math.random()*2-1)*j));
  return new THREE.Color().setHSL(hsl.h, hsl.s, hsl.l);
}

// 构建带边框的多面体
function buildSolid(geometry, baseColor){
  const group = new THREE.Group();
  const geom = geometry.index ? geometry.toNonIndexed() : geometry;
  const pos = geom.attributes.position.array;

  for(let i=0;i<pos.length;i+=9){
    const a = new THREE.Vector3(pos[i],pos[i+1],pos[i+2]);
    const b = new THREE.Vector3(pos[i+3],pos[i+4],pos[i+5]);
    const c = new THREE.Vector3(pos[i+6],pos[i+7],pos[i+8]);

    const g = new THREE.BufferGeometry().setFromPoints([a,b,c]);
    g.setIndex([0,1,2]);
    g.computeVertexNormals();

    const m = new THREE.MeshPhongMaterial({
      color: jitterColor(baseColor).getHex(),
      side: THREE.DoubleSide,
      transparent: true,
      opacity: 0.8,
      shininess: 80
    });

    const mesh = new THREE.Mesh(g,m);

    // 黑色边框
    const edges = new THREE.EdgesGeometry(g);
    const line = new THREE.LineSegments(
      edges,
      new THREE.LineBasicMaterial({ color: 0x000000 })
    );
    mesh.add(line);

    group.add(mesh);
  }
  return group;
}

// 多面体集合
const solids = [];

// 1. Tetrahedron
solids.push(buildSolid(new THREE.TetrahedronGeometry(1), 0xffd700));
solids[0].position.x=-10;

// 2. Cube
solids.push(buildSolid(new THREE.BoxGeometry(2,2,2), 0xffd700));
solids[1].position.x=-6;

// 3. Octahedron
solids.push(buildSolid(new THREE.OctahedronGeometry(1.2), 0xffd700));
solids[2].position.x=-2;

// 4. Dodecahedron
solids.push(buildSolid(new THREE.DodecahedronGeometry(1.3), 0xffd700));
solids[3].position.x=2;

// 5. Icosahedron
solids.push(buildSolid(new THREE.IcosahedronGeometry(1.3), 0xffd700));
solids[4].position.x=6;

// 6. Truncated Icosahedron (近似：使用 SphereGeometry 替代演示)
solids.push(buildSolid(new THREE.IcosahedronGeometry(1.6,1), 0xffd700));
solids[5].position.x=10;

// 加入场景
solids.forEach(s=>scene.add(s));

// 动画循环
function animate(){
  requestAnimationFrame(animate);
  solids.forEach((s,i)=>s.rotation.y += 0.004*(i+1));
  controls.update();
  renderer.render(scene,camera);
}
animate();

// 窗口自适应
window.addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
