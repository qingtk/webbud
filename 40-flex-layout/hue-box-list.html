<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hue Box List</title>
  <style>
    .hue-list {
      display: flex;
      flex-wrap: wrap;
      gap: 2px;
      margin: 2em;
    }
    .hue-box {
      width: 50px;
      height: 50px;
      border-radius: 8px;
      border: 1px solid #bbb;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9em;
      color: #333;
      background: #eee;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
  </style>
</head>
<body>
  <div class="hue-list" id="hueList"></div>
  <script>
    const list = document.getElementById('hueList');
    for(let h=0; h<=1.01; h+=0.05) {
      const box = document.createElement('div');
      box.className = 'hue-box';
      const hueDeg = Math.round(h * 360);
      box.style.background = `hsl(${hueDeg}, 80%, 60%)`;
      box.textContent = h.toFixed(2)+'  '+(h * 360).toFixed();
      list.appendChild(box);
    }
  </script>
</body>
</html>
